name: Build and deploy ASP.Net Core app to Azure Web App - backlogr-api-web-app

on:
  push:
    branches:
      - main
    paths:
      - 'Backlogr.Api/**'
      - '.github/workflows/backlogr-api-web-app.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./Backlogr.Api

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Backlogr.Api.csproj

      - name: Build
        run: dotnet build Backlogr.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Backlogr.Api.csproj --configuration Release --output "${{ github.workspace }}/published-api" --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}/published-api

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./published-api

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_492FC12526F4484AA74A939BBE88ACE4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B007C7F250D94D10A7F44B3C1CB2E4DD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_64EC1AEB395248A285CBE5400641E83B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'backlogr-api-web-app'
          slot-name: 'Production'
          package: ./published-api