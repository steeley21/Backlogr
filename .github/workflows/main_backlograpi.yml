name: Build and deploy ASP.Net Core app to Azure Web App - BacklogrAPI

on:
  push:
    branches:
      - main
    paths:
      - 'Backlogr.Api/**'
      - '.github/workflows/main_backlograpi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./Backlogr.Api

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Backlogr.Api.csproj

      - name: Build
        run: dotnet build Backlogr.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Backlogr.Api.csproj --configuration Release --output "${{ github.workspace }}/published-api" --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}/published-api

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./published-api

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DEDFF375DE1B480E95B45C1E9BD99F42 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6F17A881292743108D2C32A5D9E88DCB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A46373CA73164B949CFCF2FA8E47F75D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'BacklogrAPI'
          slot-name: 'Production'
          package: ./published-api