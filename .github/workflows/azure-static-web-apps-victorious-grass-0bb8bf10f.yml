name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Backlogr.Web/**'
      - '.github/workflows/azure-static-web-apps-victorious-grass-0bb8bf10f.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'Backlogr.Web/**'
      - '.github/workflows/azure-static-web-apps-victorious-grass-0bb8bf10f.yml'

concurrency:
  group: swa-backlogr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_frontend:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Frontend Test Job
    defaults:
      run:
        working-directory: ./Backlogr.Web

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backlogr.Web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend tests
        run: npm test

      - name: Generate static frontend
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
        run: npm run generate

      - name: Upload generated frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backlogr-static-site
          path: Backlogr.Web/.output/public

  build_and_deploy_job:
    needs: test_frontend
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Download generated frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: backlogr-static-site
          path: ./site

      - name: Deploy prebuilt static site
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_GRASS_0BB8BF10F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './site'
          output_location: ''
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_GRASS_0BB8BF10F }}
          action: 'close'
          app_location: 'Backlogr.Web'