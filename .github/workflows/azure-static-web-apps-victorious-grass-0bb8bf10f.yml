name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'Backlogr.Web/**'
      - '.github/workflows/azure-static-web-apps-yellow-sky-021bf550f.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'Backlogr.Web/**'
      - '.github/workflows/azure-static-web-apps-yellow-sky-021bf550f.yml'

concurrency:
  group: swa-backlogr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backlogr.Web/package-lock.json

      - name: Install dependencies
        working-directory: Backlogr.Web
        run: npm ci

      - name: Build Nuxt app
        working-directory: Backlogr.Web
        run: npm run build

      - name: Deploy prebuilt app to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_GRASS_0BB8BF10F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload

          # Prebuilt output paths
          app_location: "Backlogr.Web/.output/public"
          api_location: "Backlogr.Web/.output/server"
          output_location: ""

          # Tell SWA not to rebuild with Oryx
          skip_app_build: true
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_GRASS_0BB8BF10F }}
          action: close
          app_location: "Backlogr.Web"